<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Capacitación STM - Beneficio Estudiantil 2026</title>
    <link rel="icon" type="image/png" href="logo nuevo.png">

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --stm-primary: #4f46e5;
            --stm-accent: #f59e0b;
            --nav-bg: #111827;
            --text-dark: #1e293b;
            --glass: rgba(255, 255, 255, 0.85);
            --bg-body: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        body.dark-mode {
            --stm-primary: #818cf8;
            --text-dark: #f1f5f9;
            --bg-body: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass: rgba(30, 41, 59, 0.85);
        }

        .hidden {
            display: none !important;
        }

        .nav-home-pulse i {
            animation: home-blink 2s infinite ease-in-out;
        }

        @keyframes home-blink {

            0%,
            100% {
                color: #4b5563;
                transform: scale(1);
            }

            50% {
                color: white;
                transform: scale(1.2);
            }
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-body);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        html {
            height: 100%;
        }

        header {
            padding: 40px 20px 20px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-container {
            width: 50px;
            height: 50px;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .welcome-msg h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .welcome-msg p {
            margin: 0;
            font-size: 1.05rem;
            opacity: 0.8;
            font-weight: 600;
            color: var(--stm-primary);
        }

        .container {
            padding: 25px 20px 145px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* --- HERO SECTION --- */
        .hero-banner {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            border-radius: 24px;
            padding: 30px 20px;
            color: white;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.2);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .hero-banner::after {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .hero-banner h2 {
            margin: 0 0 10px;
            font-size: 1.4rem;
            font-weight: 800;
        }

        .hero-banner p {
            margin: 0;
            font-size: 0.9rem;
            opacity: 0.9;
            line-height: 1.4;
        }

        .course-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .course-card {
            background: white;
            border-radius: 22px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: 1px solid #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            animation: cardIn 0.5s backwards;
            min-height: 170px;
            width: 100%;
        }


        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            border-color: var(--stm-primary);
        }

        .course-card:active {
            transform: scale(0.95);
        }

        .course-card i {
            font-size: 2rem;
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .g-1 {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        .g-2 {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .g-3 {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }

        .g-4 {
            background: linear-gradient(135deg, #f59e0b, #d97706);
        }

        .g-5 {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        body.dark-mode .course-card i {
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .course-card h4 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 800;
            color: var(--text-dark);
            line-height: 1.2;
        }

        .course-card span {
            font-size: 0.72rem;
            color: #64748b;
            font-weight: 500;
            line-height: 1.2;
        }

        body.dark-mode .course-card {
            background: #1e293b;
            border-color: #334155;
        }

        body.dark-mode .course-card h4 {
            color: white;
        }

        body.dark-mode .course-card span {
            color: #94a3b8;
        }

        /* Centrar último botón si es impar y mantener tamaño */
        .course-card:last-child:nth-child(odd) {
            grid-column: 1 / span 2;
            width: calc(50% - 8px);
            margin: 0 auto;
        }



        /* --- MODAL COURSE --- */
        .search-modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .search-modal.active {
            display: flex;
            opacity: 1;
        }

        .search-content {
            background: white;
            width: 100%;
            max-width: 380px;
            border-radius: 35px;
            padding: 40px 25px;
            position: relative;
            transform: scale(0.6);
            opacity: 0;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-height: 90vh;
            overflow-y: auto;
        }

        .search-modal.active .search-content {
            transform: scale(1);
            opacity: 1;
        }

        body.dark-mode .search-content {
            background: #1e293b;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .course-detail-icon {
            font-size: 3rem;
            color: var(--stm-primary);
            margin-bottom: 20px;
            display: block;
        }

        .course-detail-title {
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .course-detail-desc {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #64748b;
            margin-bottom: 25px;
        }

        body.dark-mode .course-detail-desc {
            color: #94a3b8;
        }

        .course-content-list {
            text-align: left;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .course-content-list li {
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        body.dark-mode .course-content-list li {
            border-bottom-color: #334155;
        }

        .course-content-list li i {
            color: #10b981;
            font-size: 0.8rem;
        }

        /* --- BOT & NAV (STRICT) --- */
        /* --- FAB BOT CONTAINER --- */
        .fab-bot-container {
            position: relative;
            width: 60px;
            height: 60px;
            animation: botBreathe 3s infinite ease-in-out;
        }

        /* --- FAB BOT (Estilo Banco Provincia) --- */
        .fab-bot {
            width: 60px;
            height: 60px;
            background: transparent !important;
            border-radius: 14px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: none;
            transition: transform 0.3s;
            position: relative;
            z-index: 2;
        }

        .fab-bot:active {
            transform: scale(0.9);
        }

        .fab-bot img {
            width: 130%;
            height: 130%;
            object-fit: cover;
        }

        /* Pulse rings */
        .fab-bot-pulse {
            position: absolute;
            width: 60px;
            height: 60px;
            border-radius: 14px;
            border: 2.5px solid rgba(99, 102, 241, 0.5);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1);
            animation: pulseRing 2.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            pointer-events: none;
            z-index: 1;
        }

        .fab-bot-pulse:nth-child(2) {
            animation-delay: 0.8s;
        }

        .fab-bot-pulse:nth-child(3) {
            animation-delay: 1.6s;
        }

        @keyframes pulseRing {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.7;
            }

            100% {
                transform: translate(-50%, -50%) scale(2.2);
                opacity: 0;
            }
        }

        @keyframes botBreathe {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }

        @keyframes bounceBot {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        .bot-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            z-index: 9999;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }

        .bot-modal.active {
            visibility: visible;
            opacity: 1;
        }









        .nav-home-pulse i {
            animation: home-blink 3s infinite ease-in-out;
        }

        @keyframes home-blink {

            0%,
            100% {
                color: #64748b;
                transform: scale(1);
            }

            50% {
                color: white;
                transform: scale(1.1);
            }
        }

        /* Loader */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: 0.5s;
        }

        body.dark-mode #loader-wrapper {
            background: #0f172a;
        }

        .loader-logo {
            width: 80px;
            animation: logo-spin 2s linear infinite;
        }

        @keyframes logo-spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .bot-input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border-radius: 18px;
            border: 2px solid #f1f5f9;
            background: #f8fafc;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-dark);
            outline: none;
            transition: 0.3s;
        }

        .bot-input:focus {
            border-color: var(--stm-primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.08);
        }

        body.dark-mode .bot-input {
            background: #0f172a;
            border-color: #334155;
            color: #f1f5f9;
        }

        body.dark-mode .bot-input:focus {
            border-color: var(--stm-primary);
            background: #0f172a;
        }

        .bot-search-box {
            position: relative;
            margin-bottom: 15px;
        }

        .bot-search-box>i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--stm-primary);
            font-size: 1.1rem;
        }

        .bot-content {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: white;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            padding: 30px 20px 40px;
            transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 85vh;
            overflow-y: auto;
        }

        body.dark-mode .bot-content {
            background: #1e293b;
            color: #f1f5f9;
        }

        .bot-modal.active .bot-content {
            transform: translateY(0);
        }

        .bot-results-title {
            font-size: 0.72rem;
            font-weight: 800;
            color: var(--stm-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 0 0 10px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 25px;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 25px);
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 380px;
            height: 72px;
            background: rgba(17, 24, 39, 0.95) !important;
            backdrop-filter: blur(10px);
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 5000;
            padding: 0 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-btn {
            text-decoration: none;
            color: #64748b;
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-btn.active {
            color: white;
            background: var(--stm-primary);
            border-radius: 50%;
            transform: translateY(-12px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4);
        }

        .nav-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>

<body>

    <header>

    <main class="container animate__animated animate__fadeIn">

        <div class="hero-banner">

        <div class="course-grid" id="courseGrid">

    <!-- MODAL COURSE DETAIL -->
    <div class="search-modal" id="modalCourse" onclick="if(event.target == this) toggleCourseModal(false)">

            <div style="position: absolute; top: 15px; right: 15px; width: 35px; height: 35px; background: rgba(100, 116, 139, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #64748b; font-size: 1.2rem; transition: 0.3s;"
                onclick="toggleCourseModal(false)">

            </div>

    <!-- FAB BOT -->
    <!-- BOT & NAV -->
    <div id="fabBotIcon"
        style="position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 98px); right: 20px; z-index: 1001;">
        <div class="fab-bot-container">
            <span class="fab-bot-pulse"></span>
            <span class="fab-bot-pulse"></span>

            <div class="fab-bot" onclick="toggleBot(true)">
                <img src="logo_bot..png" alt="Bot STM">
            </div>
        </div>
    </div>

    <!-- TAB BAR NAV (STRICT) -->
    <nav class="bottom-nav">
        <a href="opciones.html" class="nav-btn nav-home-pulse"
            onclick="window.location.href='opciones.html'; return false;"><i class="fa-solid fa-house"></i></a>
        <a href="contactos.html" class="nav-btn"><i class="fa-solid fa-phone"></i></a>
        <a href="#" class="nav-btn" onclick="toggleSettings(true)"><i class="fa-solid fa-gear"></i></a>
    </nav>

    <!-- MODAL ASISTENTE -->
    <div class="bot-modal" id="modalBot" onclick="if(event.target == this) toggleBot(false)">
        <div class="bot-content">
            <div style="width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: -10px auto 20px;">
            </div>
            <div style="position:relative; margin-bottom:15px; box-sizing: border-box;"><i class="fa-solid fa-robot"
                    style="position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--stm-primary)"></i><input
                    type="text" class="bot-input" placeholder="¿En qué puedo ayudarte?" id="botSearch"
                    style="box-sizing: border-box; width: 100%;"></div>
            <div id="botRes" style="margin-top: 15px; max-height: 40vh; overflow-y:auto; box-sizing: border-box;"></div>
        </div>
    </div>

    <!-- MODAL CONFIG -->
    <div class="bot-modal" id="modalConfig" onclick="if(event.target == this) toggleSettings(false)">
        <div class="bot-content">
            <div style="width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: -10px auto 20px;">
            </div>
            <div style="position: absolute; top: 20px; right: 20px; width: 35px; height: 35px; background: rgba(100, 116, 139, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #64748b; font-size: 1.2rem; transition: 0.3s;"
                onclick="toggleSettings(false)">
                <i class="fa-solid fa-xmark"></i>
            </div>
            <h2 style="font-weight: 800; font-size: 1.3rem; margin-bottom:20px; color: var(--stm-primary);">
                Configuración</h2>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <div style="display: flex; justify-content: space-between; align-items: center;"><span
                        style="font-weight: 600;">Modo Oscuro</span><input type="checkbox" id="checkDark"
                        onchange="applyConfig('dark', this.checked)" style="width: 20px; height: 20px;"></div>
                <div style="display: flex; justify-content: space-between; align-items: center;"><span
                        style="font-weight: 600;">Ver Asistente Bot</span><input type="checkbox" id="checkBot"
                        onchange="applyConfig('bot', this.checked)" checked style="width: 20px; height: 20px;"></div>
            </div>
        </div>
    </div>

        async function sendConsultation(courseName) {
            const userId = localStorage.getItem('usuario_id') || localStorage.getItem('usrID');
            if (!userId) {
                Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo identificar al usuario. Por favor reingresa.' });
                return;
            }

            Swal.fire({
                title: 'Enviando consulta...',
                text: 'Aguarde un instante',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                // Usamos el mismo URL de dashboard que ya tenemos
                const ADMIN_BACKEND_URL = 'https://script.google.com/macros/s/AKfycbwWKS8Nbx8-TFJMmsXV6nQXs6Jinvh5TdVRom7v7aTIvsTC_RRXYoPq9_lN5IeItzCBZg/exec';

                await fetch(ADMIN_BACKEND_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'saveConsultation',
                        id_user: userId,
                        capacitacion: courseName
                    })
                });

                Swal.fire({
                    icon: 'success',
                    title: '¡Consulta enviada!',
                    text: 'Recibimos tu interés por ' + courseName + '. Pronto nos contactaremos con vos.',
                    confirmButtonColor: '#4f46e5'
                });
                toggleCourseModal(false);

            } catch (error) {
                console.error('Error:', error);
                Swal.fire({ icon: 'error', title: 'Error', text: 'No se pudo procesar la consulta.' });
            }
        }

        function applyConfig(type, value) {
            localStorage.setItem('cfg_' + type, value);
            if (type === 'dark') document.body.classList.toggle('dark-mode', value);
            if (type === 'bot') document.getElementById('fabBotIcon').classList.toggle('hidden', !value);
        }

        document.getElementById('botSearch').addEventListener('input', (e) => {
            const val = normalize(e.target.value).trim();
            const res = document.getElementById('botRes');
            if (val.length <= 2) { res.innerHTML = ""; return; }
            res.innerHTML = "";
            sitePages.filter(p => {
                const target = normalize(p.t + " " + p.tags);
                return val.split(" ").every(w => target.includes(w));
            }).forEach(p => {
