<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Convenios STM - Beneficios Exclusivos</title>
    <link rel="icon" type="image/png" href="logo_STM.png">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    
    <style>
        :root {
            --stm-primary: #4f46e5;
            --stm-accent: #10b981;
            --nav-bg: #111827;
            --text-dark: #1e293b;
            --bg-body: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        body.dark-mode {
            --stm-primary: #818cf8;
            --text-dark: #f1f5f9;
            --bg-body: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        body.dark-mode .rubro-card, body.dark-mode .convenio-card, body.dark-mode header, body.dark-mode .bot-content { background: #1e293b; color: white; border-color: #334155; }
        body.dark-mode p { color: #94a3b8; }
        .hidden { display: none !important; }
        .nav-bar { background: #111827 !important; }
        .fab-bot i { color: white !important; }

        .nav-home-pulse i {
            animation: home-blink 2s infinite ease-in-out;
        }
        @keyframes home-blink {
            0%, 100% { color: #4b5563; transform: scale(1); }
            50% { color: white; transform: scale(1.2); }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-body);
            margin: 0; padding: 0; min-height: 100vh;
            color: var(--text-dark); overflow-x: hidden;
        }

        /* --- HEADER --- */
        header {
            padding: 40px 20px 20px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            position: sticky; top: 0; z-index: 100;
        }
        .header-box { display: flex; align-items: center; gap: 15px; }
        .logo-box {
            width: 50px; height: 50px; background: white; border-radius: 14px;
            padding: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            display: flex; align-items: center; justify-content: center;
        }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .welcome-msg h1 { margin: 0; font-size: 1.25rem; font-weight: 800; }
        .welcome-msg p { margin: 0; font-size: 0.8rem; opacity: 0.5; }

        /* --- SCREEN VIEWS --- */
        .screen { display: none; padding: 20px 16px 120px; animation: fadeIn 0.4s ease; }
        .screen.active { display: block; }

        /* --- RUBROS GRID --- */
        .rubro-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .rubro-card {
            background: white; border-radius: 20px; padding: 20px;
            text-align: center; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.8);
        }
        .rubro-card:active { transform: scale(0.96); background: #f8fafc; }
        .rubro-ico {
            width: 50px; height: 50px; border-radius: 15px; margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; color: white;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
        }
        .rubro-card h3 { margin: 0; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; }

        /* --- CONVENIOS LIST --- */
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 18px; background: white; border-radius: 12px;
            font-size: 0.85rem; font-weight: 700; color: var(--stm-primary);
            margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .convenio-card {
            background: white; border-radius: 22px; padding: 18px; margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }
        .convenio-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .convenio-header h3 { margin: 0; font-size: 1.05rem; font-weight: 800; color: var(--text-dark); }
        .convenio-tag { font-size: 0.65rem; font-weight: 800; color: var(--stm-primary); background: #eef2ff; padding: 4px 8px; border-radius: 6px; }
        .convenio-detail { max-height: 0; overflow: hidden; transition: 0.4s; padding: 0; font-size: 0.9rem; line-height: 1.5; color: #64748b; white-space: pre-wrap; }
        .convenio-card.open .convenio-detail { max-height: 1000px; padding-top: 15px; }

        /* --- FAB BOT --- */
        .fab-bot {
            position: fixed; bottom: 100px; right: 20px;
            width: 60px; height: 60px;
            background: #6366f1 !important; color: white !important;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; cursor: pointer; z-index: 1001; 
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
            transition: 0.3s; animation: bounceBot 3s infinite;
        }
        .fab-bot i { color: white !important; }
        @keyframes bounceBot { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        .bot-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px);
            z-index: 2000; visibility: hidden; opacity: 0; transition: 0.3s;
        }
        .bot-modal.active { visibility: visible; opacity: 1; }
        .bot-content {
            position: absolute; bottom: 0; width: 100%; background: white;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            padding: 30px 20px; transform: translateY(100%); transition: 0.4s;
        }
        .bot-modal.active .bot-content { transform: translateY(0); }
        .bot-input { width: 100%; padding: 15px 20px 15px 50px; border-radius: 15px; border: 2px solid #f1f5f9; background: #f8fafc; font-family: inherit; }
        .bot-search-box { position: relative; }
        .bot-search-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--stm-primary); }

        /* --- NAVIGATION --- */
        .nav-bar {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 400px;
            height: 70px; background: var(--nav-bg); border-radius: 35px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); z-index: 1000;
        }
        .nav-btn { color: #4b5563; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.3s; }
        .nav-btn.active { color: white; background: var(--stm-primary); border-radius: 50%; transform: translateY(-12px); box-shadow: 0 8px 18px rgba(79, 70, 229, 0.4); }

        /* UTIL */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loader { text-align: center; padding: 40px; color: var(--stm-primary); font-weight: 700; }

        /* --- PRELOADER --- */
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .loader-logo {
            width: 100px; height: auto;
            object-fit: contain;
            animation: logo-spin 2s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes logo-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .loader-text {
            margin-top: 20px; font-weight: 700; color: var(--stm-primary);
            font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- PRELOADER FLOTANTE -->
    <div id="loader-wrapper">
        <img src="logo nuevo.png" class="loader-logo" alt="Cargando...">
        <div class="loader-text">Cargando beneficios...</div>
    </div>

    <header>
        <div class="header-box">
            <div class="logo-box">
                <img src="logo nuevo.png" alt="STM" onerror="this.src='https://placehold.co/100x100/4f46e5/ffffff?text=STM'">
            </div>
            <div class="welcome-msg">
                <h1 id="usrGreeting">¡Cargando!</h1>
                <p id="usrDisplayName">Buscando usuario...</p>
            </div>
        </div>
    </header>

    <!-- PANTALLA 1: RUBROS -->
    <div id="screenRubros" class="screen active">
        <h2 style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; margin-bottom: 20px;">Explora por categorías</h2>
        <div id="rubroGrid" class="rubro-grid">
            <div class="loader">Cargando beneficios...</div>
        </div>
    </div>

    <!-- PANTALLA 2: CONVENIOS -->
    <div id="screenConvenios" class="screen">
        <div class="back-btn" onclick="showScreen('screenRubros')"><i class="fa-solid fa-arrow-left"></i> Volver</div>
        <h2 id="currentRubroTitle" style="font-size: 1.2rem; font-weight: 800; margin-bottom: 20px;">Beneficios</h2>
        <div id="conveniosList"></div>
    </div>

    <!-- FAB BOT -->
    <div class="fab-bot" id="fabBotIcon" onclick="toggleBot(true)">
        <i class="fa-solid fa-robot"></i>
    </div>

    <!-- MODAL BOT -->
    <div class="bot-modal" id="modalBot" onclick="if(event.target == this) toggleBot(false)">
        <div class="bot-content">
            <div style="width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: -10px auto 20px;"></div>
            <div class="bot-search-box">
                <i class="fa-solid fa-robot"></i>
                <input type="text" class="bot-input" placeholder="¿Qué beneficio buscas?" id="botInput">
            </div>
            <div id="botRes" style="margin-top: 15px; max-height: 40vh; overflow-y:auto;"></div>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="opciones.html" class="nav-btn nav-home-pulse"><i class="fa-solid fa-house"></i></a>
        <a href="opciones.html" class="nav-btn active"><i class="fa-solid fa-compass"></i></a>
        <a href="contactos.html" class="nav-btn"><i class="fa-solid fa-phone"></i></a>
        <a href="#" class="nav-btn" onclick="toggleSettings(true)"><i class="fa-solid fa-gear"></i></a>
    </nav>

    <!-- MODAL CONFIGURACIÓN -->
    <div class="bot-modal" id="modalConfig" onclick="if(event.target == this) toggleSettings(false)">
        <div class="bot-content">
            <div style="width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: -10px auto 20px;"></div>
            <h2 style="font-weight: 800; font-size: 1.3rem; margin: 0 0 20px 5px; color: var(--stm-primary);">Configuración</h2>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 5px;"><span style="font-weight: 600;">Modo Oscuro</span><input type="checkbox" id="checkDark" onchange="applyConfig('dark', this.checked)" style="width: 20px; height: 20px; accent-color: var(--stm-primary);"></div>
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 5px;"><span style="font-weight: 600;">Ver Asistente Bot</span><input type="checkbox" id="checkBot" onchange="applyConfig('bot', this.checked)" checked style="width: 20px; height: 20px; accent-color: var(--stm-primary);"></div>
            </div>
            <button onclick="toggleSettings(false)" style="margin-top: 30px; padding: 15px; border-radius: 15px; border: none; background: #f1f5f9; font-weight: 800; font-family: inherit; width: 100%;">Cerrar</button>
        </div>
    </div>

    <script>
        const APP_URL = 'https://script.google.com/macros/s/AKfycbwFF-ZTptmhjFBItUzfh2CCkjycg485z2amS-girpV5hRF3JLZwWgD1yhgl63uABPwskA/exec';
        let allData = [];

        async function init() {
            try {
                const res = await fetch(APP_URL + '?action=READ_ALL');
                const data = await res.json();
                allData = (data.convenios || data.novedades).filter(c => (c.ACTIVO || '').toUpperCase() === 'SI');
                renderRubros();
            } catch (err) {
                document.getElementById('rubroGrid').innerHTML = '<p>Error al cargar. Reintenta pronto.</p>';
            }
        }

        function renderRubros() {
            const rubros = [...new Set(allData.map(c => c.rubro.toUpperCase().trim()))].sort();
            const grid = document.getElementById('rubroGrid');
            grid.innerHTML = "";
            
            rubros.forEach(r => {
                const card = document.createElement('div');
                card.className = "rubro-card";
                card.onclick = () => showConvenios(r);
                card.innerHTML = `
                    <div class="rubro-ico">${getIco(r)}</div>
                    <h3>${r}</h3>
                `;
                grid.appendChild(card);
            });
        }

        function showConvenios(rubro) {
            const filtered = allData.filter(c => c.rubro.toUpperCase().trim() === rubro);
            document.getElementById('currentRubroTitle').innerText = rubro;
            const list = document.getElementById('conveniosList');
            list.innerHTML = "";
            
            filtered.forEach(c => {
                const card = document.createElement('div');
                card.className = "convenio-card";
                card.innerHTML = `
                    <div class="convenio-header" onclick="this.parentElement.classList.toggle('open')">
                        <div style="flex:1">
                            <span class="convenio-tag">${c.rubro}</span>
                            <h3>${c.titulo}</h3>
                        </div>
                        <i class="fa-solid fa-chevron-down"></i>
                    </div>
                    <div class="convenio-detail">${c.detalle}</div>
                `;
                list.appendChild(card);
            });
            showScreen('screenConvenios');
        }

        function getIco(r) {
            if(r.includes('SALUD') || r.includes('MEDICINA')) return '<i class="fa-solid fa-stethoscope"></i>';
            if(r.includes('TURISMO') || r.includes('BALNEARIO')) return '<i class="fa-solid fa-umbrella-beach"></i>';
            if(r.includes('COMERCIO') || r.includes('TIENDA')) return '<i class="fa-solid fa-cart-shopping"></i>';
            if(r.includes('DEPORTES') || r.includes('FITNESS')) return '<i class="fa-solid fa-tennis-ball"></i>';
            if(r.includes('GASTRONOMIA') || r.includes('COMIDA')) return '<i class="fa-solid fa-utensils"></i>';
            if(r.includes('EDUCACION')) return '<i class="fa-solid fa-graduation-cap"></i>';
            if(r.includes('AUTO') || r.includes('VEHICULO')) return '<i class="fa-solid fa-car"></i>';
            if(r.includes('BENEFICIO')) return '<i class="fa-solid fa-gift"></i>';
            return '<i class="fa-solid fa-tags"></i>';
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        const sitePages = [
            { t: "Afiliación Online", d: "Inicia tu trámite para sumarte al sindicato", f: "afiliacion.html", tags: "alta inscripción socio sindicato ficha nueva sumarse", ico: "fa-user-plus" },
            { t: "Consulta de Trámite", d: "Estado de tus gestiones y expedientes", f: "consulta.html", tags: "ver estado proceso seguimiento expediente trámite", ico: "fa-magnifying-glass-chart" },
            { t: "Autoridades y Contactos", d: "Directorio de internos y secretarías", f: "contactos.html", tags: "teléfono oficina directivos secretario ayuda interno llamar", ico: "fa-address-book" },
            { t: "Convenios y Beneficios", d: "Descuentos en comercios y servicios", f: "convenios.html", tags: "comercio farmacia descuento beneficio ahorro turismo", ico: "fa-tags" },
            { t: "Género y Diversidad", d: "Protección y bienestar integral", f: "generoydiversidad.html", tags: "ayuda derechos protección género diversidad violencia bienestar", ico: "fa-hand-holding-heart" },
            { t: "Novedades STM", d: "Últimas noticias y comunicados", f: "novedades.html", tags: "noticias aviso boletín sorteos último información", ico: "fa-newspaper" }
        ];

        function toggleBot(show) { 
            document.getElementById('modalBot').classList.toggle('active', show);
            if(show) document.getElementById('botInput').focus();
        }

        document.getElementById('botInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const res = document.getElementById('botRes');
            res.innerHTML = "";
            if (val.length > 1) {
                const filtered = sitePages.filter(p => p.t.toLowerCase().includes(val) || p.tags.toLowerCase().includes(val));
                if(filtered.length > 0) {
                    res.innerHTML = `<p style="font-size:0.8rem; font-weight:800; color:var(--stm-primary); margin-bottom:10px">¡Hola! Encontré esto para vos...</p>`;
                    filtered.forEach(p => {
                        res.innerHTML += `
                            <a href="${p.f}" style="display:flex; align-items:center; gap:12px; padding:12px; background:#f8fafc; border-radius:15px; margin-bottom:8px; text-decoration:none; color:inherit; border:1px solid #e2e8f0;">
                                <div style="width:35px; height:35px; border-radius:10px; background:var(--stm-primary); color:white; display:flex; align-items:center; justify-content:center; font-size:0.9rem"><i class="fa-solid ${p.ico}"></i></div>
                                <div><h4 style="margin:0; font-size:0.85rem">${p.t}</h4><p style="margin:0; font-size:0.7rem; opacity:0.7">${p.d}</p></div>
                            </a>`;
                    });
                } else {
                    res.innerHTML = `<p style="font-size:0.8rem; opacity:0.6">No encontré resultados para eso, ¿probamos con otra palabra?</p>`;
                }
            }
        });

        init();
        const h = new Date().getHours();
        const greet = h < 12 ? "¡Buen día!" : h < 20 ? "¡Buenas tardes!" : "¡Buenas noches!";
        document.getElementById('usrGreeting').innerText = greet;
        
        const savedNames = localStorage.getItem('usrName') || "Afiliado STM";
        document.getElementById('usrDisplayName').innerText = savedNames;

        function toggleSettings(show) { document.getElementById('modalConfig').classList.toggle('active', show); }
        function applyConfig(type, value) {
            localStorage.setItem('cfg_' + type, value);
            if (type === 'dark') document.body.classList.toggle('dark-mode', value);
            if (type === 'bot') document.getElementById('fabBotIcon').classList.toggle('hidden', !value);
        }
        function loadSettings() {
            const cfg = { dark: localStorage.getItem('cfg_dark') === 'true', bot: localStorage.getItem('cfg_bot') !== 'false' };
            document.body.classList.toggle('dark-mode', cfg.dark);
            if(document.getElementById('checkDark')) document.getElementById('checkDark').checked = cfg.dark;
            const fab = document.getElementById('fabBotIcon');
            if(fab) fab.classList.toggle('hidden', !cfg.bot);
            if(document.getElementById('checkBot')) document.getElementById('checkBot').checked = cfg.bot;
        }

        window.addEventListener('load', () => {
            loadSettings();
            const loader = document.getElementById('loader-wrapper');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 600);
        });
    </script>
</body>
</html>
