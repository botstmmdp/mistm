<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contacto STM - Directorio Ágil</title>
    <link rel="icon" type="image/png" href="logo_STM.png">
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    
    <style>
        :root {
            --stm-primary: #4f46e5;
            --stm-accent: #10b981;
            --nav-bg: #111827;
            --text-dark: #1e293b;
            --glass: rgba(255, 255, 255, 0.85);
            --bg-body: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        body.dark-mode {
            --stm-primary: #818cf8;
            --text-dark: #f1f5f9;
            --bg-body: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass: rgba(30, 41, 59, 0.85);
        }

        .hidden { display: none !important; }
        .nav-footer, .nav-bar, .bottom-nav { background: #111827 !important; }
        .fab-bot i { color: white !important; }

        .nav-home-pulse i {
            animation: home-blink 2s infinite ease-in-out;
        }
        @keyframes home-blink {
            0%, 100% { color: #4b5563; transform: scale(1); }
            50% { color: white; transform: scale(1.2); }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-body);
            margin: 0; padding: 0; min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- HEADER (LOGO STM) --- */
        header {
            padding: 40px 20px 20px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            position: sticky; top: 0; z-index: 100;
        }

        .header-box { display: flex; align-items: center; gap: 15px; }
        .logo-container {
            width: 50px; height: 50px; background: white; border-radius: 14px;
            padding: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            display: flex; align-items: center; justify-content: center;
        }
        .logo-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .welcome-msg h1 { margin: 0; font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px; }
        .welcome-msg p { margin: 0; font-size: 0.8rem; opacity: 0.5; font-weight: 500; }

        /* --- BUSCADOR RÁPIDO --- */
        .search-area { padding: 20px 16px 10px; }
        .search-field {
            width: 100%; padding: 16px 20px 16px 50px;
            border-radius: 20px; border: 2px solid white;
            background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            font-family: inherit; font-size: 1rem; transition: 0.3s;
        }
        .search-field:focus { outline: none; border-color: var(--stm-primary); }
        .search-relative { position: relative; }
        .search-relative i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--stm-primary); opacity: 0.5; }

        /* --- LISTA DE CONTACTOS --- */
        .contact-list {
            padding: 10px 16px 120px;
            display: grid; grid-template-columns: 1fr; gap: 12px;
        }

        .contact-card {
            background: white; border-radius: 22px; padding: 16px;
            display: flex; align-items: center; gap: 15px;
            text-decoration: none; color: inherit;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeIn 0.5s ease-out forwards;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            border: 1px solid rgba(255,255,255,0.8);
        }
        .contact-card:active { transform: scale(0.97); background: #fdfdfd; }
        
        .ico-circle {
            width: 48px; height: 48px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; color: white; flex-shrink: 0;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            box-shadow: 0 5px 12px rgba(79, 70, 229, 0.2);
        }

        .info-box { flex-grow: 1; }
        .info-box h3 { margin: 0; font-size: 1rem; font-weight: 700; color: var(--text-dark); }
        .info-box p { margin: 2px 0 0; font-size: 0.75rem; color: #64748b; font-weight: 500; }
        .ext-badge { 
            background: #eef2ff; color: var(--stm-primary); 
            padding: 4px 10px; border-radius: 10px; 
            font-size: 0.85rem; font-weight: 800;
        }

        /* --- FAB ASISTENTE (BOT) --- */
        .fab-bot {
            position: fixed; bottom: 100px; right: 20px;
            width: 60px; height: 60px;
            background: #6366f1 !important; color: white !important;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; cursor: pointer; z-index: 1001; 
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
            transition: 0.3s; animation: bounceBot 3s infinite;
        }
        .fab-bot i { color: white !important; }
        @keyframes bounceBot { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        /* --- ASISTENTE OVERLAY --- */
        .bot-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(8px);
            z-index: 2000; visibility: hidden; opacity: 0; transition: 0.3s;
        }
        .bot-modal.active { visibility: visible; opacity: 1; }
        .bot-content {
            position: absolute; bottom: 0; width: 100%; background: white;
            border-top-left-radius: 30px; border-top-right-radius: 30px;
            padding: 30px 20px; transform: translateY(100%); transition: 0.4s;
        }
        .bot-modal.active .bot-content { transform: translateY(0); }

        /* --- NAVIGATION --- */
        .nav-footer {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 40px); max-width: 400px;
            height: 70px; background: var(--nav-bg);
            border-radius: 35px; padding: 0 10px;
            display: flex; justify-content: space-around; align-items: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); z-index: 1000;
        }
        .nav-link {
            text-decoration: none; color: #4b5563; width: 50px; height: 50px;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem; transition: 0.3s;
        }
        .nav-link.active { color: white; background: var(--stm-primary); border-radius: 50%; transform: translateY(-12px); box-shadow: 0 8px 18px rgba(79, 70, 229, 0.4); }

        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- PRELOADER --- */
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        /* --- PRELOADER --- */
        #loader-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }
        body.dark-mode #loader-wrapper { background: #0f172a; }
        .loader-logo {
            width: 100px; height: auto;
            object-fit: contain;
            animation: logo-spin 2s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes logo-spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .loader-text { font-weight: 700; color: var(--stm-primary); letter-spacing: 1px; text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body>

    <!-- PRELOADER FLOTANTE -->
    <div id="loader-wrapper">
        <img src="logo nuevo.png" class="loader-logo" alt="Cargando...">
        <div class="loader-text">Cargando Directorio...</div>
    </div>

    <header>
        <div class="header-box">
            <div class="logo-container">
                <img src="logo nuevo.png" alt="STM" onerror="this.src='https://placehold.co/100x100/4f46e5/ffffff?text=STM'">
            </div>
            <div class="welcome-msg">
                <h1 id="usrGreeting">¡Cargando!</h1>
                <p id="usrDisplayName">Buscando usuario...</p>
            </div>
        </div>
    </header>

    <div class="search-area">
        <div class="search-relative">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" class="search-field" placeholder="Buscar por oficina o nombre..." id="mainSearch">
        </div>
    </div>

    <main class="contact-list" id="list">
        <!-- Render dinámico de contactos -->
    </main>

    <!-- FAB ASISTENTE -->
    <div class="fab-bot" id="fabBotIcon" onclick="toggleBot(true)">
        <i class="fa-solid fa-robot"></i>
    </div>

    <!-- MODAL BOT -->
    <div class="bot-modal" id="modalBot" onclick="if(event.target == this) toggleBot(false)">
        <div class="bot-content">
            <div style="width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: -10px auto 20px;"></div>
            <div class="search-relative">
                <i class="fa-solid fa-robot"></i>
                <input type="text" class="search-field" placeholder="¿Qué interno buscas?" id="botSearch">
            </div>
            <div id="botRes" style="margin-top:15px; max-height:40vh; overflow-y:auto;"></div>
        </div>
    </div>

    <nav class="nav-footer">
        <a href="opciones.html" class="nav-link nav-home-pulse"><i class="fa-solid fa-house"></i></a>
        <a href="opciones.html" class="nav-link"><i class="fa-solid fa-compass"></i></a>
        <a href="#" class="nav-link active"><i class="fa-solid fa-phone"></i></a>
        <a href="#" class="nav-link" onclick="toggleSettings(true)"><i class="fa-solid fa-gear"></i></a>
    </nav>

    <!-- MODAL CONFIGURACIÓN -->
    <div class="bot-modal" id="modalConfig" onclick="if(event.target == this) toggleSettings(false)">
        <div class="bot-content">
            <div style="width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: -10px auto 20px;"></div>
            <h2 style="font-weight: 800; font-size: 1.3rem; margin: 0 0 20px 5px; color: var(--stm-primary);">Configuración</h2>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 5px;"><span style="font-weight: 600;">Modo Oscuro</span><input type="checkbox" id="checkDark" onchange="applyConfig('dark', this.checked)" style="width: 20px; height: 20px; accent-color: var(--stm-primary);"></div>
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 5px;"><span style="font-weight: 600;">Ver Asistente Bot</span><input type="checkbox" id="checkBot" onchange="applyConfig('bot', this.checked)" checked style="width: 20px; height: 20px; accent-color: var(--stm-primary);"></div>
            </div>
            <button onclick="toggleSettings(false)" style="margin-top: 30px; padding: 15px; border-radius: 15px; border: none; background: #f1f5f9; font-weight: 800; font-family: inherit; width: 100%;">Cerrar</button>
        </div>
    </div>

    <script>
        const contacts = [
            { name: "Sec. General", ref: "Daniel Alberto ZACARIAS", ext: "100" },
            { name: "Sec. Adjunto", ref: "Cristian Gabriel MILASINCIC", ext: "138" },
            { name: "Finanzas", ref: "Gaston Ignacio ARMENDARIZ", ext: "135" },
            { name: "Organización", ref: "Alejandro Jorge MARQUEZ", ext: "113" },
            { name: "Gremial", ref: "Soledad LEIVA", ext: "130" },
            { name: "Adm. y Actas", ref: "M. de los Angeles IRAZABAL", ext: "133" },
            { name: "Acción Social", ref: "Fernando N. SALOME", ext: "137" },
            { name: "Previsión Social", ref: "Sebastián G. MENDEZ", ext: "120" },
            { name: "Prensa", ref: "Nicolas A. ALVEREZ LOZZI", ext: "125" },
            { name: "Relac. Públicas", ref: "Ricardo A. PIGNATARO", ext: "128" },
            { name: "Mujer", ref: "Cecilia M. GAUDIOSO", ext: "131" },
            { name: "Docente", ref: "Alejandra S. AYEK", ext: "122" },
            { name: "Jerárquico", ref: "Claudio J. CAMBARERI", ext: "132" },
            { name: "Higiene", ref: "María V. MAIO", ext: "118" },
            { name: "Profesional", ref: "María Laura VILLALBA", ext: "132" }
        ];

        function render(list, containerId, isBot = false) {
            const container = document.getElementById(containerId);
            container.innerHTML = "";
            list.forEach(c => {
                container.innerHTML += `
                    <a href="tel:2234723756" class="contact-card">
                        <div class="ico-circle"><i class="fa-solid fa-phone"></i></div>
                        <div class="info-box">
                            <h3>${c.name}</h3>
                            <p>${c.ref}</p>
                        </div>
                        <div class="ext-badge">${c.ext}</div>
                    </a>
                `;
            });
        }

        document.getElementById('mainSearch').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = contacts.filter(c => c.name.toLowerCase().includes(val) || c.ref.toLowerCase().includes(val) || c.ext.includes(val));
            render(filtered, 'list');
        });

        const sitePages = [
            { t: "Afiliación Online", d: "Inicia tu trámite para sumarte al sindicato", f: "afiliacion.html", tags: "alta inscripción socio sindicato ficha nueva sumarse", ico: "fa-user-plus" },
            { t: "Consulta de Trámite", d: "Estado de tus gestiones y expedientes", f: "consulta.html", tags: "ver estado proceso seguimiento expediente trámite", ico: "fa-magnifying-glass-chart" },
            { t: "Autoridades y Contactos", d: "Directorio de internos y secretarías", f: "contactos.html", tags: "teléfono oficina directivos secretario ayuda interno llamar", ico: "fa-address-book" },
            { t: "Convenios y Beneficios", d: "Descuentos en comercios y servicios", f: "convenios.html", tags: "comercio farmacia descuento beneficio ahorro turismo salud clínica médico sanatorio farmacia", ico: "fa-tags" },
            { t: "Género y Diversidad", d: "Protección y bienestar integral", f: "generoydiversidad.html", tags: "ayuda derechos protección género diversidad violencia bienestar", ico: "fa-hand-holding-heart" },
            { t: "Novedades STM", d: "Últimas noticias y comunicados", f: "novedades.html", tags: "noticias aviso boletín sorteos último información", ico: "fa-newspaper" }
        ];

        let allConvenios = [];
        const CONVENIOS_URL = 'https://script.google.com/macros/s/AKfycbwFF-ZTptmhjFBItUzfh2CCkjycg485z2amS-girpV5hRF3JLZwWgD1yhgl63uABPwskA/exec?action=READ_ALL';

        async function fetchConvenios() {
            if (allConvenios.length > 0) return;
            try {
                const res = await fetch(CONVENIOS_URL);
                const data = await res.json();
                allConvenios = (data.convenios || []).filter(c => (c.ACTIVO || '').toUpperCase() === 'SI');
            } catch (e) { console.error("Bot fail", e); }
        }

        function normalize(str) {
            return (str || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
        }

        document.getElementById('botSearch').addEventListener('input', (e) => {
            const val = normalize(e.target.value);
            const res = document.getElementById('botRes');
            res.innerHTML = "";
            if (val.length > 2) {
                const words = val.split(" ").filter(w => w.length > 2);

                const filtered = sitePages.filter(p => {
                    const target = normalize(p.t + " " + p.tags);
                    return words.some(w => target.includes(w)) || target.includes(val);
                });

                const filteredConv = allConvenios.filter(c => {
                    const target = normalize(c.titulo + " " + c.rubro + " " + c.detalle);
                    return words.some(w => target.includes(w)) || target.includes(val);
                }).slice(0, 7);

                if (filtered.length > 0 || filteredConv.length > 0) {
                    res.innerHTML = `<p style="font-size:0.8rem; font-weight:800; color:var(--stm-primary); margin-bottom:10px">¡Hola! Encontré esto para vos...</p>`;
                    filtered.forEach(p => {
                        res.innerHTML += `
                            <a href="${p.f}" style="display:flex; align-items:center; gap:12px; padding:12px; background:#f8fafc; border-radius:15px; margin-bottom:8px; text-decoration:none; color:inherit; border:1px solid #e2e8f0; display:block">
                                <div style="display:flex; align-items:center; gap:10px">
                                    <div style="width:30px; height:30px; border-radius:8px; background:var(--stm-primary); color:white; display:flex; align-items:center; justify-content:center; font-size:0.8rem"><i class="fa-solid ${p.ico}"></i></div>
                                    <div><h4 style="margin:0; font-size:0.85rem">${p.t}</h4><p style="margin:0; font-size:0.7rem; opacity:0.7">${p.d}</p></div>
                                </div>
                            </a>`;
                    });

                    filteredConv.forEach(c => {
                        res.innerHTML += `
                            <a href="convenios.html" style="display:flex; align-items:center; gap:12px; padding:12px; background:#f8fafc; border-radius:15px; margin-bottom:8px; text-decoration:none; color:inherit; border:1px solid #e2e8f0; border-left: 4px solid #10b981; display:block">
                                <div style="display:flex; align-items:center; gap:10px">
                                    <div style="width:30px; height:30px; border-radius:8px; background:#10b981; color:white; display:flex; align-items:center; justify-content:center; font-size:0.8rem"><i class="fa-solid fa-gift"></i></div>
                                    <div>
                                        <h4 style="margin:0; font-size:0.65rem; color:#10b981; text-transform:uppercase">${c.rubro}</h4>
                                        <h4 style="margin:0; font-size:0.85rem">${c.titulo}</h4>
                                    </div>
                                </div>
                            </a>`;
                    });
                } else {
                    res.innerHTML = `<p style="font-size:0.8rem; opacity:0.6">No encontré resultados para eso, ¿probamos con otra palabra?</p>`;
                }
            }
        });

        function toggleBot(show) {
            document.getElementById('modalBot').classList.toggle('active', show);
            if(show) {
                document.getElementById('botSearch').focus();
                fetchConvenios();
            }
        }

        // Init
        render(contacts, 'list');

        // Saludo dinámico y Nombre de Usuario
        const h = new Date().getHours();
        const greet = h < 12 ? "¡Buen día!" : h < 20 ? "¡Buenas tardes!" : "¡Buenas noches!";
        document.getElementById('usrGreeting').innerText = greet;
        
        const savedNames = localStorage.getItem('usrName') || "Afiliado STM";
        document.getElementById('usrDisplayName').innerText = savedNames;

        function toggleSettings(show) { document.getElementById('modalConfig').classList.toggle('active', show); }
        function applyConfig(type, value) {
            localStorage.setItem('cfg_' + type, value);
            if (type === 'dark') document.body.classList.toggle('dark-mode', value);
            if (type === 'bot') document.getElementById('fabBotIcon').classList.toggle('hidden', !value);
        }
        function loadSettings() {
            const cfg = { dark: localStorage.getItem('cfg_dark') === 'true', bot: localStorage.getItem('cfg_bot') !== 'false' };
            document.body.classList.toggle('dark-mode', cfg.dark);
            if(document.getElementById('checkDark')) document.getElementById('checkDark').checked = cfg.dark;
            const fab = document.getElementById('fabBotIcon');
            if(fab) fab.classList.toggle('hidden', !cfg.bot);
            if(document.getElementById('checkBot')) document.getElementById('checkBot').checked = cfg.bot;
        }

        window.addEventListener('load', () => {
            loadSettings();
            const loader = document.getElementById('loader-wrapper');
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 600);
        });
    </script>
</body>
</html>
